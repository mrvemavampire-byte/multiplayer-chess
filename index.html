<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eruba Multiplayer Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        .game-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        #myBoard {
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        #status {
            font-weight: bold;
            color: #f1c40f;
        }
        .controls {
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .game-id-section {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            border-radius: 4px;
            border: none;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Eruba Multiplayer Chess ♟️</h1>
        
        <div class="game-id-section">
            <input type="text" id="gameIdInput" placeholder="Enter Game ID" value="default-room">
            <button id="joinBtn">Join Game</button>
        </div>

        <div id="myBoard"></div>
        
        <div class="info">
            <p>Status: <span id="status">Join a game to start</span></p>
            <p>Your Color: <span id="playerColor">-</span></p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
