<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF و la-meta" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eruba Chess: Solo & Duo</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #2c3e50;
            color: white; font-family: 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }
        .game-container { width: 90%; max-width: 450px; text-align: center; }
        #myBoard { width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; display: none; }
        .info { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; }
        #status { font-weight: bold; color: #f1c40f; }
        .menu { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button {
            padding: 12px 25px; font-size: 18px; cursor: pointer;
            background-color: #3498db; color: white; border: none;
            border-radius: 8px; transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .secondary-btn { background-color: #95a5a6; }
        .input-group { margin-top: 20px; display: none; flex-direction: column; gap: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; text-align: center; font-size: 16px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Eruba Chess ♟️</h1>
        
        <div id="mainMenu" class="menu">
            <h3>Choose Game Mode</h3>
            <div class="btn-group">
                <button onclick="startSinglePlayer()">Single Player (vs AI)</button>
                <button onclick="showMultiplayer()">Multiplayer (with Friend)</button>
            </div>
            <div id="multiplayerInputs" class="input-group">
                <input type="text" id="gameIdInput" placeholder="Enter Game ID" value="default-room">
                <button onclick="joinMultiplayer()">Join Game</button>
            </div>
        </div>

        <div id="myBoard"></div>
        
        <div id="gameInfo" class="info">
            <p>Status: <span id="status">Initializing...</span></p>
            <p>Your Color: <span id="playerColor">-</span></p>
            <button onclick="location.reload()" style="background:#e74c3c">Quit Game</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
